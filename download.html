<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Xeno - Download</title>
<style>
/* RESET & NAVBAR same as index.html */
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body { background:#000; color:white; scroll-behavior:smooth; overflow-x:hidden; }
nav { display:flex; justify-content:space-between; align-items:center; padding:20px 60px; background:#111; position:fixed; width:100%; top:0; left:0; z-index:1000; }
nav ul { display:flex; gap:30px; list-style:none; margin:0; padding:0; }
nav ul li a { color:#ccc; text-decoration:none; font-size:16px; padding:8px 15px; border-radius:50px; transition:all 0.3s ease; }
nav ul li a:hover { transform:scale(1.1); box-shadow:0 0 0 3px rgba(255,255,255,0.3); color:#fff; }
.logo { font-size:24px; font-weight:bold; }
.discord { background:#111; color:white; border:1px solid #333; padding:10px 18px; border-radius:50px; cursor:pointer; transition:all 0.3s ease; }
.discord:hover { transform:scale(1.1); box-shadow:0 0 0 5px rgba(255,255,255,0.3); background:#fff; color:#000; }

.main-content { padding-top:140px; margin:0 auto; max-width:1200px; text-align:center; overflow:hidden; }

.download-section h1 { font-size:50px; margin-bottom:40px; }
.download-buttons { display:flex; flex-direction:column; gap:25px; width:90%; max-width:400px; margin:0 auto; }
.download-btn { display:inline-block; text-align:center; font-size:18px; border-radius:50px; border:2px solid white; padding:18px 35px; text-decoration:none; transition:all 0.3s ease; background:#000; color:#fff; }
.download-btn.blue-btn:hover { background:#1e90ff; color:#fff; transform:scale(1.05); box-shadow:0 0 0 5px rgba(30,144,255,0.3); }
.download-btn.green-btn:hover { background:#28a745; color:#fff; transform:scale(1.05); box-shadow:0 0 0 5px rgba(40,167,69,0.3); }

.animate-on-load > * { opacity:0; transform:translateY(40px); transition:all 0.8s ease-out; }
.animate-on-load .animate { opacity:1 !important; transform:translateY(0) !important; }
</style>
</head>
<body>

<nav>
  <div class="logo">Xeno</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="help.html">Help</a></li>
    <li><a href="executor.html">Executor</a></li>
    <li><a href="download.html">Download</a></li>
    <li><a href="credits.html">Credits</a></li>
  </ul>
  <button class="discord">Join Discord</button>
</nav>

<section class="download-section main-content animate-on-load">
  <h1>Download</h1>
  <div class="download-buttons">
    <a href="files/Xeno-1bcT5a.exe" class="download-btn blue-btn" download="Xeno-Client.exe">Download now 1.3.26 (Beta, new UI)</a>
    <a href="files/Xeno-1bcT5a.exe" class="download-btn blue-btn" download="Xeno-Client.exe">Download now (Old GUI)</a>
    <a href="files/Xeno-1bcT5a.exe" class="download-btn green-btn" download="Xeno-Client.exe">Download now DDL</a>
  </div>
</section>

<script>
window.addEventListener('load', () => {
  const elements = document.querySelectorAll('.animate-on-load > *');
  elements.forEach((el,i) => { setTimeout(() => el.classList.add('animate'), i*200); });
});
</script>

</body>
</html>
